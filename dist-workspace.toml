# cargo-dist configuration for the cli/daemon/tray binaries. The desktop app is
# bundled separately by Tauri (it needs native webview libs and does not
# cross-compile). Run `cargo dist init` to (re)generate the release workflow.
[workspace]
members = ["cargo:crates/cli", "cargo:crates/daemon"]

[dist]
cargo-dist-version = "0.28.0"
ci = "github"
installers = ["shell", "powershell"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
install-path = "CARGO_HOME"
