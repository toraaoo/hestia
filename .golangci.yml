version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  settings:
    revive:
      rules:
        # This repo exports plenty of symbols from internal packages; requiring doc comments everywhere
        # adds noise without improving the public API.
        - name: exported
          disabled: true
        # Package comments aren't useful for internal-only packages.
        - name: package-comments
          disabled: true

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt

issues:
  # Lint the whole codebase.
  new: false
