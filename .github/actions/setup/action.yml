name: Build Hestia
description: >
  Shared build setup for Hestia — toolchain, caches (compiler cache, CEF, bun
  deps), frontend build, then configure + build the full tree. Used by both the
  CI and release workflows. Run after actions/checkout (with submodules).

inputs:
  cache-variant:
    description: Compiler-cache tool (e.g. ccache). Empty = no compiler cache.
    required: false
    default: ''
  cache-key:
    description: Suffix for the compiler-cache key (e.g. ci, release).
    required: true
  extra-cmake-args:
    description: Extra args appended to the configure command.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ninja-build libglib2.0-dev libgtk-3-dev libnss3-dev \
          libx11-dev libxext-dev

    - name: Set up MSVC environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up Ninja (Windows)
      if: runner.os == 'Windows'
      uses: seanmiddleditch/gha-setup-ninja@v6

    - name: Compiler cache
      if: inputs.cache-variant != ''
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        variant: ${{ inputs.cache-variant }}
        key: ${{ runner.os }}-${{ inputs.cache-key }}
        max-size: 2G

    - name: Cache CEF distribution
      uses: actions/cache@v5
      with:
        path: third_party/cef
        key: cef-${{ runner.os }}-${{ hashFiles('cmake/cef_version.cmake', 'cmake/DownloadCEF.cmake') }}

    - uses: oven-sh/setup-bun@v2

    - name: Cache frontend dependencies
      uses: actions/cache@v5
      with:
        path: apps/desktop/frontend/node_modules
        key: bun-${{ runner.os }}-${{ hashFiles('apps/desktop/frontend/bun.lock') }}

    - name: Build frontend
      shell: bash
      working-directory: apps/desktop/frontend
      run: |
        bun install --frozen-lockfile
        bun run build

    - name: Configure
      shell: bash
      run: |
        launcher=""
        if [ -n "${{ inputs.cache-variant }}" ]; then
          launcher="-DCMAKE_C_COMPILER_LAUNCHER=${{ inputs.cache-variant }} -DCMAKE_CXX_COMPILER_LAUNCHER=${{ inputs.cache-variant }}"
        fi
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_CCACHE=OFF \
          $launcher ${{ inputs.extra-cmake-args }}

    - name: Build
      shell: bash
      run: cmake --build build
