name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# A tag push releases; a manual dispatch is a dry run (builds + uploads workflow
# artifacts, but does not touch a GitHub Release).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf file

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.name }}

      - uses: oven-sh/setup-bun@v2
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.10.1

      - name: Build installers + portable archive
        shell: bash
        run: scripts/package.sh all

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hestia-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/msi/*.msi
            target/package/*.tar.gz
            target/package/*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/msi/*.msi
            target/package/*.tar.gz
            target/package/*.zip
