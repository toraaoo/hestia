name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z). Required for manual runs.'
        required: false
        type: string

permissions:
  contents: write

env:
  CONFIGURATION: Release

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $v = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}".TrimStart('v')
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw "version is required" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        shell: pwsh
        run: dotnet test Hestia.sln -c $env:CONFIGURATION

      - name: Build staging
        shell: pwsh
        run: ./packaging/build-stage.ps1 -Rid win-x64 -Version "${{ steps.ver.outputs.version }}"

      - name: Setup WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $stage = (Resolve-Path "artifacts/stage/win-x64").Path
          New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
          wix build packaging/windows/Hestia.wxs -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext -d Version=$ver -d StagingDir=$stage -o "artifacts/dist/Hestia-$ver-win-x64.msi"

      - name: Build ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
          Compress-Archive -Path "artifacts/stage/win-x64/*" -DestinationPath "artifacts/dist/Hestia-$ver-win-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/dist/*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$v" ]]; then
            echo "version is required" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install nfpm
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_amd64.deb -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb
          nfpm --version

      - name: Test
        shell: bash
        run: dotnet test Hestia.sln -c "$CONFIGURATION"

      - name: Build staging
        shell: bash
        run: |
          chmod +x ./packaging/build-stage.sh
          ./packaging/build-stage.sh linux-x64 "${{ steps.ver.outputs.version }}"

      - name: Build DEB/RPM
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          mkdir -p artifacts/dist
          VERSION="$ver" nfpm pkg -p deb -f packaging/linux/nfpm.yaml -t "artifacts/dist/hestia_${ver}_amd64.deb"
          VERSION="$ver" nfpm pkg -p rpm -f packaging/linux/nfpm.yaml -t "artifacts/dist/hestia-${ver}-1.x86_64.rpm"

      - name: Build tar.gz
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          mkdir -p artifacts/dist
          tar -C artifacts/stage/linux-x64 -czf "artifacts/dist/Hestia-$ver-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/dist/*

  release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
    steps:
      - name: Determine tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts/dist -type f -print0 | xargs -0 -I{} mv {} out/

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd out
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: out/*
