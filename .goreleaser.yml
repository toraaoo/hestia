version: 2

project_name: hestia

before:
  hooks:
    - go mod tidy

builds:
  - id: hestia
    main: ./cmd/hestia
    binary: hestia
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/toraaoo/hestia/internal/version.Version={{.Version}}
      - -X github.com/toraaoo/hestia/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/toraaoo/hestia/internal/version.BuildDate={{.Date}}
  - id: hestiad
    main: ./cmd/hestiad
    binary: hestiad
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: hestia
    ids: [hestia, hestiad]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

nfpms:
  - id: packages
    package_name: hestia
    vendor: Hestia
    homepage: https://github.com/toraaoo/hestia
    maintainer: Hestia Maintainers
    description: Minecraft server manager
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    contents:
      - src: configs/hestiad.service
        dst: /lib/systemd/system/hestiad.service
        type: config
    scripts:
      postinstall: configs/postinstall.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
