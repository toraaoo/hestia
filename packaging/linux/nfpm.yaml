name: hestia
arch: amd64
platform: linux
version: ${VERSION}
release: 1
section: utils
priority: optional
maintainer: Hestia
vendor: Hestia
description: Hestia is a tool for managing local Minecraft servers.
license: ""

contents:
  - src: artifacts/stage/linux-x64/
    dst: /opt/hestia/
  - src: /opt/hestia/hestia
    dst: /usr/bin/hestia
    type: symlink
  - src: packaging/linux/hestia.desktop
    dst: /usr/share/applications/hestia.desktop

# Conservative baseline deps for Avalonia Desktop on common distros.
# Validate/adjust from `ldd` outputs during packaging verification.
depends:
  - libc6
  - libgcc-s1
  - libstdc++6
  - libx11-6
  - libxrandr2
  - libxi6
  - libxext6
  - libxcb1
  - libxrender1
  - libxkbcommon0
  - libfontconfig1
  - libfreetype6
  - libglib2.0-0
